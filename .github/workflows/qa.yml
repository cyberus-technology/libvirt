name: QA
on:
  push:
    branches: [ gardenlinux ]
  pull_request:
    branches: [ gardenlinux ]
jobs:
  nixos-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Libvirt Tests
        run: |
          nix build .#tests.driver
          ./result/bin/nixos-test-driver
